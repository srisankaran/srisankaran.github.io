<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sri Sankaran</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:linear-gradient(-45deg,
    #4facfe,
    #00f2fe,
    #7367f0,
    #5ee7df);

    background-size:400% 400%;

    animation:bg 12s ease infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

body::before{

content:"";

position:absolute;

width:350px;
height:350px;

background:white;

opacity:.12;

border-radius:50%;

top:-100px;
left:-100px;

filter:blur(20px);

}

body::after{

content:"";

position:absolute;

width:300px;
height:300px;

background:#ffffff;

opacity:.08;

border-radius:50%;

bottom:-120px;
right:-80px;

filter:blur(20px);

}

.card{

position:relative;

width:420px;

padding:45px;

border-radius:28px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.2);

box-shadow:
0 10px 35px rgba(0,0,0,.2);

text-align:center;

color:white;

z-index:5;

}

.logo{

width:90px;

height:90px;

object-fit:contain;

margin-bottom:18px;

}

h1{

font-size:2rem;

font-weight:700;

letter-spacing:.5px;

}

.subtitle{

margin-top:8px;

font-size:1rem;

font-weight:300;

opacity:.9;

}

.line{

margin:28px auto;

width:70px;

height:2px;

background:white;

opacity:.35;

}

.links{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

}

.links a{

text-decoration:none;

color:white;

padding:14px;

border-radius:16px;

background:rgba(255,255,255,.12);

border:1px solid rgba(255,255,255,.18);

transition:.3s;

font-size:.95rem;

display:flex;

justify-content:center;

align-items:center;

gap:10px;

}

.links a:hover{

transform:translateY(-4px);

background:rgba(255,255,255,.22);

box-shadow:0 10px 25px rgba(0,0,0,.18);

}

.footer{

margin-top:28px;

font-size:.85rem;

opacity:.75;

}

@media(max-width:500px){

.card{

width:90%;

padding:35px 25px;

}

.links{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="card">

<img src="assets/iitb-logo.png"
class="logo"
alt="IIT Bombay">

<h1>Sri Sankaran</h1>

<p class="subtitle">
PhD Research Scholar
</p>

<div class="line"></div>

<div class="links">

<a href="#" target="_blank">
<i class="fab fa-linkedin"></i>
LinkedIn
</a>

<a href="#" target="_blank">
<i class="fab fa-instagram"></i>
Instagram
</a>

<a href="#" target="_blank">
<i class="fas fa-graduation-cap"></i>
Google Scholar
</a>

<a href="#" target="_blank">
<i class="fab fa-facebook"></i>
Facebook
</a>

<a href="#" target="_blank">
<i class="fas fa-file-pdf"></i>
Curriculum Vitae
</a>

</div>

<div class="footer">
Indian Institute of Technology Bombay
</div>

</div>

</body>
</html>
