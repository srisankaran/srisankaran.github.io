<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sri Sankaran</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--gold:#b4935c;
--blue:#244f96;
--text:#1b2232;
--muted:#616d84;
}
body{
font-family:Inter,sans-serif;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at 15% 20%,rgba(175,205,255,.5),transparent 28%),
radial-gradient(circle at 80% 15%,rgba(216,224,255,.55),transparent 32%),
radial-gradient(circle at 80% 85%,rgba(184,208,255,.35),transparent 30%),
linear-gradient(135deg,#fcfcfd,#eef4ff 50%,#fbfbfd);
}
body:before,body:after{
content:"";
position:absolute;
border-radius:50%;
filter:blur(80px);
pointer-events:none;
}
body:before{
width:420px;height:420px;
background:rgba(174,202,255,.35);
left:-120px;top:-100px;
animation:f1 10s ease-in-out infinite;
}
body:after{
width:380px;height:380px;
background:rgba(196,214,255,.3);
right:-120px;bottom:-100px;
animation:f2 12s ease-in-out infinite;
}
@keyframes f1{50%{transform:translate(40px,30px)}}
@keyframes f2{50%{transform:translate(-35px,-25px)}}

.card{
width:min(760px,92vw);
padding:48px;
border-radius:36px;
background:rgba(255,255,255,.58);
backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);
border:1px solid rgba(255,255,255,.75);
box-shadow:0 30px 70px rgba(31,53,99,.14);
transition:transform .15s ease;
transform-style:preserve-3d;
}
.logo{width:95px;display:block;margin:0 auto 14px}
.brand{
text-align:center;
font:600 1rem "Cormorant Garamond",serif;
letter-spacing:3px;
color:#7a6a4d;
}
h1{
font:700 4.5rem "Cormorant Garamond",serif;
text-align:center;
color:var(--text);
line-height:1;
margin:14px 0 8px;
}
.role{
text-align:center;
font:600 1.1rem "Cormorant Garamond",serif;
letter-spacing:2px;
color:var(--blue);
text-transform:uppercase;
}
.sep{
width:170px;
height:1px;
background:linear-gradient(90deg,transparent,var(--gold),transparent);
margin:22px auto;
position:relative;
}
.sep:after{
content:"";
width:8px;height:8px;
border-radius:50%;
background:var(--gold);
position:absolute;
left:50%;top:50%;
transform:translate(-50%,-50%);
}
.dept{
text-align:center;
color:var(--text);
font:500 1.05rem Inter,sans-serif;
line-height:1.7;
margin-bottom:28px;
}
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}
.btn{
text-decoration:none;
background:rgba(255,255,255,.45);
border:1px solid rgba(255,255,255,.9);
backdrop-filter:blur(12px);
border-radius:20px;
padding:24px 12px;
text-align:center;
color:var(--text);
transition:.3s;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}
.btn i{
display:block;
font-size:2rem;
color:var(--blue);
margin-bottom:12px;
}
.btn span{
font:500 1rem "Cormorant Garamond",serif;
}
.btn:hover{
transform:translateY(-6px);
border-color:#d7c5a0;
box-shadow:0 18px 40px rgba(36,79,150,.12);
}
.quote{
margin-top:34px;
text-align:center;
font:600 1.1rem "Cormorant Garamond",serif;
letter-spacing:3px;
color:#7d6a49;
}
@media(max-width:700px){
h1{font-size:3rem}
.grid{grid-template-columns:repeat(2,1fr)}
.card{padding:30px}
}
@media(max-width:480px){
.grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="card" id="card">
<img src="assets/iitb-logo.png" class="logo" alt="IIT Bombay Logo">
<div class="brand">IIT BOMBAY</div>
<h1>Sri Sankaran</h1>
<div class="role">PhD Research Scholar</div>
<div class="sep"></div>
<div class="dept">
Department of Electrical Engineering<br>
Indian Institute of Technology Bombay
</div>

<div class="grid">
<a class="btn" href="#"><i class="fab fa-linkedin"></i><span>LinkedIn</span></a>
<a class="btn" href="#"><i class="fas fa-graduation-cap"></i><span>Google Scholar</span></a>
<a class="btn" href="#"><i class="fas fa-file-pdf"></i><span>Curriculum Vitae</span></a>
<a class="btn" href="#"><i class="fab fa-instagram"></i><span>Instagram</span></a>
<a class="btn" href="#"><i class="fab fa-facebook"></i><span>Facebook</span></a>
<a class="btn" href="mailto:"><i class="fas fa-envelope"></i><span>Email</span></a>
</div>

<div class="sep"></div>
<div class="quote">ज्ञानम् परमम् ध्येयम्</div>
</div>

<script>
const card=document.getElementById("card");
document.addEventListener("mousemove",e=>{
const r=card.getBoundingClientRect();
const x=e.clientX-r.left-r.width/2;
const y=e.clientY-r.top-r.height/2;
card.style.transform=`perspective(1200px) rotateX(${-y/35}deg) rotateY(${x/35}deg)`;
});
document.addEventListener("mouseleave",()=>card.style.transform="perspective(1200px) rotateX(0) rotateY(0)");
</script>
</body>
</html>
