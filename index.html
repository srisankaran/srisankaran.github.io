<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sri Sankaran</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

overflow:hidden;

background:
radial-gradient(circle at top left,#ffffff,#edf4ff 45%,transparent 70%),
radial-gradient(circle at bottom right,#f5f8ff,#ffffff 55%);

}

/* Background blobs */

body::before{

content:"";

position:absolute;

width:520px;
height:520px;

background:#dbeafe;

border-radius:50%;

filter:blur(120px);

top:-180px;
left:-180px;

animation:float1 10s ease-in-out infinite;

}

body::after{

content:"";

position:absolute;

width:420px;
height:420px;

background:#bfdbfe;

border-radius:50%;

filter:blur(110px);

right:-120px;
bottom:-120px;

animation:float2 12s ease-in-out infinite;

}

@keyframes float1{

0%,100%{

transform:translate(0,0);

}

50%{

transform:translate(40px,30px);

}

}

@keyframes float2{

0%,100%{

transform:translate(0,0);

}

50%{

transform:translate(-30px,-40px);

}

}

.card{

position:relative;

width:430px;

padding:48px;

border-radius:32px;

background:rgba(255,255,255,.70);

backdrop-filter:blur(30px);

-webkit-backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.9);

box-shadow:
0 30px 60px rgba(15,23,42,.10);

text-align:center;

z-index:10;

animation:fade .8s ease;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(25px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.logo{

width:90px;

margin-bottom:22px;

}

h1{

font-size:2.4rem;

font-weight:700;

color:#111827;

}

.subtitle{

margin-top:10px;

font-size:1.05rem;

color:#2563eb;

font-weight:500;

}

.institute{

margin-top:6px;

font-size:.95rem;

color:#6b7280;

}

.line{

margin:30px auto;

width:70px;

height:2px;

background:#d1d5db;

}

.links{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:16px;

}

.links a{

text-decoration:none;

display:flex;

justify-content:center;
align-items:center;

gap:10px;

padding:15px;

border-radius:18px;

background:white;

color:#111827;

border:1px solid #e5e7eb;

font-size:.95rem;

font-weight:500;

transition:.3s;

}

.links a:hover{

background:#2563eb;

color:white;

transform:translateY(-5px);

box-shadow:0 18px 30px rgba(37,99,235,.20);

}

.footer{

margin-top:30px;

font-size:.82rem;

color:#94a3b8;

}

@media(max-width:500px){

.card{

width:92%;
padding:35px 25px;

}

.links{

grid-template-columns:1fr;

}

h1{

font-size:2rem;

}

}

</style>

</head>

<body>

<div class="card">

<img src="assets/iitb-logo.png"
class="logo"
alt="IIT Bombay">

<h1>Sri Sankaran</h1>

<div class="subtitle">
PhD Research Scholar
</div>

<div class="institute">
Department of Electrical Engineering<br>
Indian Institute of Technology Bombay
</div>

<div class="line"></div>

<div class="links">

<a href="#" target="_blank">
<i class="fab fa-linkedin"></i>
LinkedIn
</a>

<a href="#" target="_blank">
<i class="fab fa-instagram"></i>
Instagram
</a>

<a href="#" target="_blank">
<i class="fas fa-graduation-cap"></i>
Google Scholar
</a>

<a href="#" target="_blank">
<i class="fas fa-file-pdf"></i>
Curriculum Vitae
</a>

<a href="#" target="_blank">
<i class="fab fa-facebook"></i>
Facebook
</a>

<a href="mailto:your@email.com">
<i class="fas fa-envelope"></i>
Email
</a>

</div>

<div class="footer">
© 2026 Sri Sankaran
</div>

</div>

</body>

</html>
