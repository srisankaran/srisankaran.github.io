<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Sankaran | IIT Bombay</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
background:
radial-gradient(circle at 10% 20%,rgba(189,215,255,.45),transparent 30%),
radial-gradient(circle at 90% 80%,rgba(198,220,255,.35),transparent 30%),
linear-gradient(135deg,#fbfcff,#eef4ff,#ffffff);
}
body::before,body::after{
content:"";
position:absolute;
border-radius:50%;
filter:blur(80px);
z-index:0;
}
body::before{
width:340px;height:340px;
background:rgba(173,202,255,.30);
left:-80px;top:-80px;
}
body::after{
width:300px;height:300px;
background:rgba(205,220,255,.28);
right:-70px;bottom:-70px;
}
.card{
position:relative;
z-index:1;
width:min(760px,92vw);
padding:52px;
border-radius:34px;
background:rgba(255,255,255,.60);
backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);
border:1px solid rgba(255,255,255,.85);
box-shadow:0 25px 60px rgba(30,50,90,.12);
animation:fade .9s ease;
}
@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:none}
}
.logo{display:block;width:90px;margin:0 auto 18px}
.brand{
text-align:center;
letter-spacing:4px;
font:600 .95rem "Cormorant Garamond",serif;
color:#8b6b37;
}
h1{
font:700 4.4rem "Cormorant Garamond",serif;
text-align:center;
color:#1d2433;
margin:10px 0;
}
.role{
text-align:center;
color:#234e9b;
font:600 1rem "Cormorant Garamond",serif;
letter-spacing:2px;
text-transform:uppercase;
}
.line{
width:180px;
height:1px;
margin:24px auto;
background:linear-gradient(90deg,transparent,#b69357,transparent);
}
.profile{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
display:block;
margin:0 auto 25px;
border:5px solid rgba(255,255,255,.8);
box-shadow:0 10px 30px rgba(0,0,0,.12);
}
.dept{
text-align:center;
color:#58647b;
line-height:1.8;
margin-bottom:32px;
}
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}
.btn{
text-decoration:none;
background:rgba(255,255,255,.55);
border:1px solid rgba(255,255,255,.9);
border-radius:18px;
padding:22px;
color:#1f2937;
text-align:center;
transition:.25s;
box-shadow:0 10px 24px rgba(0,0,0,.04);
}
.btn i{
display:block;
font-size:1.9rem;
margin-bottom:12px;
color:#234e9b;
}
.btn span{
font-family:"Cormorant Garamond",serif;
font-size:1.15rem;
font-weight:600;
}
.btn:hover{
transform:translateY(-4px);
background:#fff;
box-shadow:0 18px 36px rgba(36,79,150,.12);
}
.footer{
margin-top:32px;
text-align:center;
font-family:"Cormorant Garamond",serif;
letter-spacing:3px;
color:#8b6b37;
}
@media(max-width:700px){
h1{font-size:3rem}
.grid{grid-template-columns:repeat(2,1fr)}
.card{padding:32px}
}
@media(max-width:480px){
.grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="card">

<img src="assets/iitb-logo.svg" class="logo" alt="IIT Bombay">

<div class="brand">INDIAN INSTITUTE OF TECHNOLOGY BOMBAY</div>

<h1>Sri Sankaran</h1>

<div class="role">PhD Research Scholar</div>

<div class="line"></div>

<div class="dept">
Department of Electrical Engineering<br>
Indian Institute of Technology Bombay
</div>

<div class="grid">

<a class="btn" href="#"><i class="fab fa-linkedin"></i><span>LinkedIn</span></a>

<a class="btn" href="#"><i class="fas fa-graduation-cap"></i><span>Google Scholar</span></a>

<a class="btn" href="#"><i class="fas fa-file-pdf"></i><span>Curriculum Vitae</span></a>

<a class="btn" href="#"><i class="fab fa-instagram"></i><span>Instagram</span></a>

<a class="btn" href="#"><i class="fab fa-facebook"></i><span>Facebook</span></a>

<a class="btn" href="mailto:"><i class="fas fa-envelope"></i><span>Email</span></a>

</div>

<div class="line"></div>

<div class="footer">ज्ञानम् परमम् ध्येयम्</div>

</div>

</body>
</html>
